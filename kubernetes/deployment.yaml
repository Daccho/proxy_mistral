apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-mistral
  labels:
    app: proxy-mistral
spec:
  replicas: 1  # Single replica: scheduler must not run in parallel
  selector:
    matchLabels:
      app: proxy-mistral
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: proxy-mistral
    spec:
      containers:
      - name: proxy-mistral
        image: proxy-mistral:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: api
          protocol: TCP
        - containerPort: 8765
          name: ws
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_URL
          value: "sqlite:////app/data/proxy_mistral.db"
        - name: MEETING_BAAS_API_KEY
          valueFrom:
            secretKeyRef:
              name: proxy-mistral-secrets
              key: meeting_baas_api_key
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: proxy-mistral-secrets
              key: mistral_api_key
        - name: ELEVENLABS_API_KEY
          valueFrom:
            secretKeyRef:
              name: proxy-mistral-secrets
              key: elevenlabs_api_key
        - name: GOOGLE_CALENDAR_CREDENTIALS
          valueFrom:
            secretKeyRef:
              name: proxy-mistral-secrets
              key: google_calendar_credentials
        - name: SCHEDULER_ENABLED
          value: "true"
        - name: CALENDAR_POLL_INTERVAL
          value: "5"
        - name: MAX_CONCURRENT_MEETINGS
          value: "1"
        - name: PUBLIC_WS_URL
          value: "wss://proxy-mistral.example.com/ws"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: proxy-mistral-data
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

---

apiVersion: v1
kind: Service
metadata:
  name: proxy-mistral
  labels:
    app: proxy-mistral
spec:
  type: ClusterIP
  ports:
  - name: api
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: ws
    port: 8765
    targetPort: 8765
    protocol: TCP
  selector:
    app: proxy-mistral

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: proxy-mistral-data
  labels:
    app: proxy-mistral
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxy-mistral
  labels:
    app: proxy-mistral
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - proxy-mistral.example.com
    secretName: proxy-mistral-tls
  rules:
  - host: proxy-mistral.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: proxy-mistral
            port:
              number: 8000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: proxy-mistral
            port:
              number: 8765

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proxy-mistral
  labels:
    app: proxy-mistral
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proxy-mistral
  minReplicas: 1
  maxReplicas: 1  # Single replica for scheduler; split into separate deployments to scale API
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80